<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesis Mobile - Weapon Codex</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans', sans-serif;
      background-color: #c9b99a;
      color: #3a2e1e;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── Top Nav ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background-color: #c9b99a;
      border-bottom: 1px solid #a89070;
    }

    .site-title {
      font-size: 14px;
      font-weight: 700;
      color: #3a2e1e;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    nav a {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #8a7060;
      border-radius: 4px;
      background: #d9c9aa;
      color: #3a2e1e;
      cursor: pointer;
      transition: background 0.2s;
    }

    nav a:hover, nav a.active {
      background: #b09070;
      color: #fff;
    }

    /* ── Page Content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .page-header {
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .page-subtitle-en {
      font-size: 12px;
      letter-spacing: 3px;
      color: #7a6a50;
      margin-left: 8px;
    }

    .page-desc {
      font-size: 12px;
      color: #6a5a40;
      margin-top: 4px;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filters select {
      padding: 5px 10px;
      border: 1px solid #8a7060;
      border-radius: 4px;
      background: #d9c9aa;
      font-size: 13px;
      color: #3a2e1e;
      cursor: pointer;
    }

    .filters label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      padding: 5px 10px;
      border: 1px solid #8a7060;
      border-radius: 4px;
      background: #d9c9aa;
    }

    .filters input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 5px 12px;
      border: 1px solid #8a7060;
      border-radius: 4px;
      background: #d9c9aa;
      font-size: 13px;
      color: #3a2e1e;
    }

    .filters input[type="text"]::placeholder {
      color: #9a8a70;
    }

    /* ── Table ── */
    .weapon-table-wrap {
      border: 1px solid #8a7060;
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #d9c9aa;
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #5a4a30;
      background: #c9b99a;
      border-bottom: 1px solid #8a7060;
    }

    tbody tr {
      border-bottom: 1px dashed #b09070;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #cfc0a0; }

    td {
      padding: 10px 14px;
      font-size: 13px;
      vertical-align: middle;
    }

    .td-name {
      font-weight: 700;
      white-space: nowrap;
    }

    .td-name button {
      background: none;
      border: none;
      font-weight: 700;
      font-size: 13px;
      color: #3a2e1e;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .td-name button:hover { color: #7a3010; }

    .td-type, .td-char { white-space: nowrap; }

    .char-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }

    .badge-red    { background: #c03020; }
    .badge-blue   { background: #2060c0; }
    .badge-orange { background: #c07020; }
    .badge-purple { background: #7030a0; }
    .badge-green  { background: #207040; }
    .badge-teal   { background: #206070; }

    .changes-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .change-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #c0a878;
      border: 1px solid #9a8050;
      cursor: pointer;
      transition: background 0.15s;
    }

    .change-tag:hover { background: #a08858; color: #fff; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #d9c9aa;
      border-radius: 8px;
      width: 540px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 22px 24px;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #5a4a30;
    }

    .modal-close:hover { color: #c03020; }

    .modal-weapon-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-weapon-type {
      font-size: 12px;
      color: #6a5a40;
      margin-bottom: 10px;
    }

    .modal-char-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      margin-left: 6px;
    }

    /* Star buttons */
    .star-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .star-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #8a7060;
      background: #c9b99a;
      cursor: pointer;
      font-size: 12px;
      min-width: 52px;
      transition: background 0.15s, border-color 0.15s;
    }

    .star-btn:hover { background: #b09070; }

    .star-btn.active {
      background: #7a6050;
      color: #fff;
      border-color: #5a4030;
    }

    .star-btn .star-label {
      font-weight: 700;
      font-size: 13px;
    }

    .star-btn .star-change {
      font-size: 9px;
      color: #c03020;
      text-align: center;
      line-height: 1.2;
    }

    .star-btn.active .star-change { color: #ffb080; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stats-box {
      background: #c9b99a;
      border-radius: 6px;
      padding: 10px 14px;
    }

    .stats-box-title {
      font-size: 11px;
      font-weight: 600;
      color: #6a5a40;
      margin-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-weight: 700;
      color: #3a7030;
    }

    .stat-prev {
      font-size: 11px;
      color: #7a6a50;
      margin-left: 4px;
    }

    /* Character tab */
    .char-tabs {
      display: flex;
      margin-bottom: 14px;
      border-bottom: 2px solid #8a7060;
    }

    .char-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #c9b99a;
      border: none;
      border-radius: 4px 4px 0 0;
      color: #5a4a30;
      transition: background 0.15s;
    }

    .char-tab.active {
      background: #d9c9aa;
      border-bottom: 2px solid #d9c9aa;
      margin-bottom: -2px;
      color: #3a2e1e;
    }

    .char-tab:hover { background: #cfc0a0; }

    /* Skill section */
    .skill-section { margin-top: 4px; }

    .skill-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .skill-desc-box {
      background: #c9b99a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .related-buffs-title {
      font-size: 12px;
      font-weight: 600;
      color: #6a5a40;
      margin-bottom: 8px;
    }

    .buff-box {
      background: #c9b99a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .buff-name {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .buff-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 4px;
    }

    .tag-shield { background: #4080c0; color: #fff; }
    .tag-undispellable { background: #7a3010; color: #fff; }
    .tag-heal-block { background: #a03060; color: #fff; }

    /* Scrollbar */
    .modal::-webkit-scrollbar { width: 6px; }
    .modal::-webkit-scrollbar-track { background: #c9b99a; }
    .modal::-webkit-scrollbar-thumb { background: #8a7060; border-radius: 3px; }

    /* Footer */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #8a7060;
      border-top: 1px solid #a89070;
      margin-top: 24px;
    }
  </style>
</head>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentWeapon = null;
let currentStar = 1;

// ══════════════════════════════════════════════
//  RENDER TABLE
// ══════════════════════════════════════════════
function renderTable(list) {
  const tbody = document.getElementById('weaponTableBody');
  tbody.innerHTML = '';
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#7a6a50;">No weapons found.</td></tr>';
    return;
  }
  list.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-name">
        <button onclick="openModal(${w.id})">${w.name}</button>
      </td>
      <td class="td-type">${w.type}</td>
      <td class="td-char">
        <span class="char-badge ${w.charBadge}">${w.character}</span>
      </td>
      <td>
        <div class="changes-cell">
          ${w.changes.map(c => `<span class="change-tag" onclick="openModalAtStar(${w.id},${c.star})">${c.text}</span>`).join('')}
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════════
function filterWeapons() {
  const typeVal = document.getElementById('typeFilter').value;
  const exclusiveOnly = document.getElementById('exclusiveFilter').checked;
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = weapons.filter(w => {
    if (typeVal !== 'all' && w.type !== typeVal) return false;
    if (exclusiveOnly && !w.exclusive) return false;
    if (search) {
      const haystack = (w.name + ' ' + w.type + ' ' + w.character).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  renderTable(filtered);
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function openModal(id, star) {
  currentWeapon = weapons.find(w => w.id === id);
  currentStar = star || 1;
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
}

function openModalAtStar(id, star) {
  openModal(id, star);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectStar(star) {
  currentStar = star;
  renderModal();
}

function renderModal() {
  const w = currentWeapon;
  const s = w.stars[currentStar];

  // Star button labels
  const starChanges = {};
  w.changes.forEach(c => { starChanges[c.star] = c.text; });

  const starBtns = [1,2,3,4,5,6].map(n => {
    const isActive = n === currentStar ? 'active' : '';
    const changeText = starChanges[n] ? `<span class="star-change">${starChanges[n].replace(/★\d\s*/,'')}</span>` : '';
    return `<button class="star-btn ${isActive}" onclick="selectStar(${n})">
      <span class="star-label">★${n}</span>
      ${changeText}
    </button>`;
  }).join('');

  // Bonus stats
  const bonusRows = s.bonusStats.map(bs => `
    <div class="stat-row">
      <span>${bs.name}</span>
      <span>
        <span class="stat-value">${bs.value}</span>
        ${bs.prev ? `<span class="stat-prev">← ${bs.prev}</span>` : ''}
      </span>
    </div>
  `).join('');

  // Base stats
  const baseStatLabel = s.baseStats.statName || 'ATK';
  const baseRows = `
    <div class="stat-row"><span>Max HP</span><span class="stat-value">${s.baseStats.hp}</span></div>
    <div class="stat-row"><span>${baseStatLabel}</span><span class="stat-value">${s.baseStats.atk}</span></div>
  `;

  // Buffs
  const buffHTML = s.buffs.map(b => {
    const tagHTML = (b.tags || []).map(t => {
      if (t === 'shield') return `<span class="buff-tag tag-shield">Shield</span>`;
      if (t === 'heal-block') return `<span class="buff-tag tag-heal-block">Heal Block</span>`;
      return '';
    }).join('');
    return `
      <div class="buff-box">
        <div class="buff-name">${b.name}</div>
        ${b.lines.map(l => `<div>${l}</div>`).join('')}
        ${tagHTML}
      </div>
    `;
  }).join('');

  // Skill desc (newlines → <br>)
  const skillDescHTML = s.skillDesc.replace(/\n/g, '<br>');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-weapon-name">
      ${w.name}
      <span class="modal-char-badge ${w.charBadge}">${w.character}</span>
    </div>
    <div class="modal-weapon-type">${w.type} / ${w.attackType}</div>

    <div class="star-row">${starBtns}</div>

    <div class="stats-grid">
      <div class="stats-box">
        <div class="stats-box-title">Bonus Stats (★${currentStar})</div>
        ${bonusRows}
      </div>
      <div class="stats-box">
        <div class="stats-box-title">Base Stats <span style="font-weight:400;font-size:10px;">(by star grade)</span></div>
        ${baseRows}
      </div>
    </div>

    <div class="char-tabs">
      <button class="char-tab active">${w.character}</button>
      <button class="char-tab">Other Characters</button>
    </div>

    <div class="skill-section">
      <div class="skill-name">${s.skillName}</div>
      <div class="skill-desc-box">${skillDescHTML}</div>
      <div class="related-buffs-title">Related Buffs</div>
      ${buffHTML}
    </div>
  `;
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
renderTable(weapons);
</script>
